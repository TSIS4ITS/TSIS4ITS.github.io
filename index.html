 <!DOCTYPE html>
<html>
    <head>
        <!-- In your <head> tag -->
        <script src="https://cdn.botpress.cloud/desk/webchat/v4.0/inject.js"></script>
        <style>
            html{
                font-family: 'Courier New', Courier, monospace;
            }
            #webchat .bpWebchat {
                position: unset;
                width: 100%;
                height: 100%;
                max-height: 100%;
                max-width: 100%;
            }

            #webchat .bpFab {
                display: none;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Test ChatBot "PričalicaĐipiti"</h1>
        </header>
        <main>
            <!-- Put this on your page BEFORE the script below -->
            <div id="webchat" style="width: 500px; height: 500px;"></div>

            <!-- normalan deo sajta -->


            <!-- In your <body> tag -->
            <script>
                window.botpress.on("webchat:ready", () => {
                    window.botpress.open();
                });
                window.botpress.init({
                    "botId": "49165123-5810-4ed6-8326-a302859ce537",
                 "configuration": {
                    "version": "v1",
                    "website": {},
                    "email": {},
                    "phone": {},
                    "termsOfService": {},
                    "privacyPolicy": {},
                    "color": "#3276EA",
                    "variant": "solid",
                    "headerVariant": "glass",
                    "themeMode": "light",
                    "fontFamily": "inter",
                    "radius": 4,
                    "feedbackEnabled": false,
                    "footer": "[⚡ by Botpress](https://botpress.com/?from=webchat)"
                },
                    "clientId": "896515a3-b530-4f8c-a516-c1c5062c6242",
                    "selector": "#webchat"
                });
            </script>
        </main>
        <footer>

        </footer>
    </body>
</html>
