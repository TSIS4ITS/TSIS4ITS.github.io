<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test ChatBot - PričalicaĐipiti</title>

<!-- Botpress Webchat -->
<script src="https://cdn.botpress.cloud/desk/webchat/v4.0/inject.js"></script>

<style>

body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    background:#f4f4f4;
}

header{
    background:#3276EA;
    color:white;
    padding:20px;
    text-align:center;
}

main{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

#webchat{
    width:500px;
    height:500px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    background:white;
}

/* prilagođavanje Botpress prozora */

#webchat .bpWebchat{
    position:relative;
    width:100%;
    height:100%;
    max-height:100%;
    max-width:100%;
}

/* sakriva floating dugme */

#webchat .bpFab{
    display:none;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>
</head>

<body>

<header>
<h1>Test ChatBot "PričalicaĐipiti"</h1>
<p>AI asistent za početnike u IT industriji</p>
</header>

<main>

<div id="webchat"></div>

</main>

<footer>
<p>Školski projekat - Chatbot demonstracija</p>
</footer>

<script>

document.addEventListener("DOMContentLoaded", function () {

  window.botpress.on("webchat:ready", () => {
      window.botpress.open();
  });

  window.botpress.init({
    botId: "49165123-5810-4ed6-8326-a302859ce537",
    clientId: "896515a3-b530-4f8c-a516-c1c5062c6242",
    selector: "#webchat",

    configuration: {
      version: "v1",
      color: "#3276EA",
      variant: "solid",
      headerVariant: "glass",
      themeMode: "light",
      fontFamily: "inter",
      radius: 4,
      feedbackEnabled: false,
      footer: "[⚡ by Botpress](https://botpress.com/?from=webchat)"
    }

  });

});

</script>

</body>
</html>
